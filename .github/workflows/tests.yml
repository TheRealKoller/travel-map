name: tests

on:
  push:
    branches:
      - feature/*
      - copilot/*
  workflow_call:

jobs:
  unit-tests:
    name: Unit and Feature Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: travel_map
          MARIADB_USER: travel_map
          MARIADB_PASSWORD: secret
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Test Environment Variables
        run: |
          echo "MAPBOX_ACCESS_TOKEN=test-token-for-ci" >> .env

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: pk.test-token-for-ci

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Run Unit and Feature Tests
        run: ./vendor/bin/pest --testsuite=Unit,Feature

  browser-tests:
    name: Browser Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Test Environment File
        run: cp .env.testing .env

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: pk.eyJ1IjoidGVzdCIsImEiOiJ0ZXN0In0.test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Browser Tests
        run: ./vendor/bin/pest --testsuite=Browser --log-junit=browser-test-report.xml
        continue-on-error: true

      - name: Publish Browser Test Summary
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: browser-test-report.xml
          check_name: Browser Test Results
          fail_on_failure: true
          include_passed: true
          detailed_summary: true

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-screenshots
          path: tests/Browser/Screenshots/
          retention-days: 14
