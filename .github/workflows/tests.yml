name: tests

on:
  push:
    branches:
      - feature/*
      - copilot/*
  workflow_call:

jobs:
  unit-tests:
    name: Unit and Feature Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: travel_map
          MARIADB_USER: travel_map
          MARIADB_PASSWORD: secret
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Test Environment Variables
        run: |
          echo "MAPBOX_ACCESS_TOKEN=test-token-for-ci" >> .env

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: pk.test-token-for-ci

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Run Unit and Feature Tests
        run: ./vendor/bin/pest
